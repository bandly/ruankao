<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>系统架构设计师刷题</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #4caf50;
            --danger: #f44336;
            --text: #333;
            --text-light: #666;
            --bg: #f5f7fa;
            --card-bg: #fff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 顶部导航 */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 100;
            color: white;
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 20px;
        }

        /* 主内容区 */
        .main {
            padding: 56px 0 80px 0;
            min-height: 100vh;
        }

        /* 进度指示 */
        .progress-bar {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-light);
            white-space: nowrap;
        }

        .progress-track {
            flex: 1;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s;
        }

        /* 题目卡片 */
        .question-card {
            padding: 16px;
            background: white;
            margin: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .question-header {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .question-num {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: #f0f0f0;
            color: var(--text-light);
        }

        .tag.knowledge {
            background: #e3f2fd;
            color: #1976d2;
        }

        .question-content {
            font-size: 16px;
            line-height: 1.7;
            color: var(--text);
            margin-bottom: 16px;
        }

        /* 题目图片 */
        .question-image img {
            max-width: 100%;
            margin: 15px 0;
            border-radius: 8px;
        }

        /* 选项 */
        .options-group {
            margin-bottom: 16px;
        }

        .options-label {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 14px 12px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            background: white;
        }

        .option-item:active {
            transform: scale(0.98);
        }

        .option-item.selected {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .option-item.correct {
            border-color: var(--success);
            background: #e8f5e9;
        }

        .option-item.wrong {
            border-color: var(--danger);
            background: #ffebee;
        }

        .option-letter {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            margin-right: 12px;
            color: var(--text);
        }

        .option-item.selected .option-letter {
            background: var(--primary);
            color: white;
        }

        .option-item.correct .option-letter {
            background: var(--success);
            color: white;
        }

        .option-item.wrong .option-letter {
            background: var(--danger);
            color: white;
        }

        .option-text {
            flex: 1;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text);
        }

        /* 答案区域 */
        .answer-box {
            margin-top: 16px;
            padding: 16px;
            background: #fafafa;
            border-radius: 10px;
        }

        .answer-box.hidden {
            display: none;
        }

        .answer-title {
            font-size: 14px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .answer-content {
            font-size: 15px;
            color: var(--text);
            padding: 12px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
        }

        .analysis-title {
            font-size: 14px;
            color: #1976d2;
            font-weight: 600;
            margin: 12px 0 8px;
        }

        .analysis-content {
            font-size: 14px;
            color: var(--text-light);
            line-height: 1.7;
            padding: 12px;
            background: white;
            border-radius: 8px;
        }

        .analysis-content p {
            margin-bottom: 10px;
            text-indent: 2em;
        }

        .analysis-content p:last-child {
            margin-bottom: 0;
        }

        .analysis-content .highlight {
            color: var(--primary);
            font-weight: 500;
        }

        /* 案例分析题样式 */
        .case-intro {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .case-intro h4 {
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .case-intro p {
            line-height: 1.7;
            color: var(--text);
        }

        .case-question-block {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .case-question-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }

        .case-question-num {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 12px;
        }

        .case-question-points {
            color: #f57c00;
            font-size: 12px;
            margin-left: 8px;
        }

        .case-question-content {
            line-height: 1.7;
            color: var(--text);
        }

        .answer-item {
            background: #fff;
            border-left: 3px solid var(--primary);
            padding: 10px 12px;
            margin-bottom: 12px;
        }

        .answer-item-header {
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .answer-item-content {
            line-height: 1.6;
            color: var(--text);
        }

        /* 论文范文样式 */
        .essay-section-title {
            color: var(--primary);
            font-size: 14px;
            margin: 15px 0 8px 0;
            padding-bottom: 4px;
            border-bottom: 2px solid var(--primary);
        }

        .essay-paragraph {
            margin-bottom: 10px;
            line-height: 1.7;
            color: var(--text);
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-top: 1px solid #eee;
            z-index: 100;
        }

        .nav-btn {
            padding: 10px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            border: none;
        }

        .nav-btn.prev {
            background: #f5f5f5;
            color: var(--text);
        }

        .nav-btn.next {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .submit-btn {
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            background: var(--success);
            color: white;
            border: none;
        }

        /* 侧边栏菜单 */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            max-width: 85vw;
            background: white;
            z-index: 201;
            transform: translateX(-100%);
            transition: transform 0.3s;
            overflow-y: auto;
        }

        .sidebar.show {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 20px 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .sidebar-header h2 {
            font-size: 18px;
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        .sidebar-content {
            padding: 16px;
        }

        .menu-section {
            margin-bottom: 20px;
        }

        .menu-title {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-count {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .menu-item {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 15px;
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-item:active {
            background: #f5f5f5;
        }

        .menu-item .count {
            font-size: 13px;
            color: var(--text-light);
        }

        .submenu-item {
            padding: 10px 12px;
            font-size: 13px;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .submenu-item:active {
            background: #f5f5f5;
        }

        /* 首页统计 */
        .home-stats {
            padding: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 20px;
            background: white;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .stat-value {
            font-size: 28px;
            font-weight: 600;
            color: var(--primary);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-light);
            margin-top: 4px;
        }

        .welcome-card {
            padding: 20px;
            background: white;
            border-radius: 12px;
            margin: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .welcome-title {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .welcome-list {
            color: var(--text-light);
            line-height: 1.8;
            font-size: 14px;
            padding-left: 20px;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 结果弹窗 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .result-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .result-content {
            width: 90%;
            max-width: 320px;
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .result-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .result-score {
            font-size: 48px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .result-detail {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .result-btn {
            padding: 12px 40px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 16px;
            cursor: pointer;
            border: none;
        }

        /* 论文范本样式 */
        .page-title {
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            background: white;
            border-bottom: 1px solid #eee;
        }

        .essay-card {
            background: white;
            border-radius: 12px;
            margin: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .essay-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 16px;
            border-radius: 12px 12px 0 0;
        }

        .essay-header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .essay-header-id {
            font-size: 12px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .essay-section {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .essay-section:last-child {
            border-bottom: none;
        }

        .essay-section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .essay-text {
            font-size: 14px;
            line-height: 1.8;
            color: var(--text);
            white-space: pre-wrap;
        }

        .essay-question {
            background: #fff3e0;
            padding: 12px;
            border-radius: 8px;
        }

        .essay-abstract {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
        }

        .essay-content {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* 登录弹窗 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 400;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-modal.hidden {
            display: none;
        }

        .login-content {
            width: 90%;
            max-width: 320px;
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        .login-title {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 25px;
        }

        .login-input-group {
            margin-bottom: 20px;
        }

        .login-input-group label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .login-input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
        }

        .login-input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 16px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-btn" onclick="toggleSidebar()">☰</div>
        <div class="header-title">架构师刷题</div>
        <div class="header-btn" onclick="showStats()">📊</div>
    </header>

    <!-- 主内容 -->
    <main class="main" id="mainContent">
        <div class="loading"><div class="spinner"></div></div>
    </main>

    <!-- 底部导航 -->
    <nav class="bottom-nav" id="bottomNav" style="display: none;">
        <button class="nav-btn prev" onclick="prevQuestion()">上一题</button>
        <div id="actionBtns"></div>
        <button class="nav-btn next" onclick="nextQuestion()">下一题</button>
    </nav>

    <!-- 侧边栏 -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>系统架构设计师</h2>
            <p>2025上半年题库</p>
        </div>
        <div class="sidebar-content" id="sidebarContent"></div>
    </aside>

    <!-- 用户登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="login-content">
            <div class="login-title">刷题系统登录</div>
            <div class="login-input-group">
                <label>请输入用户名：</label>
                <input type="text" id="usernameInput" placeholder="输入用户名" value="bandly">
            </div>
            <button class="login-btn" onclick="confirmUsername()">开始刷题</button>
        </div>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <div class="result-title">答题完成</div>
            <div class="result-score" id="resultScore">0%</div>
            <div class="result-detail" id="resultDetail">正确 0 / 错误 0</div>
            <button class="result-btn" onclick="closeResult()">继续</button>
        </div>
    </div>

    <script>
        // 全局状态
        let data = null;
        let statsData = null;  // 统计数据
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let submittedAnswers = {};
        let correctCount = 0;
        let wrongCount = 0;
        let currentQId = null;

        // 用户名（登录后设置）
        let currentUser = sessionStorage.getItem('ruankao_user') || '';

        // 确认用户名
        function confirmUsername() {
            const input = document.getElementById('usernameInput');
            const username = input.value.trim();
            if (!username) {
                alert('请输入用户名');
                return;
            }
            currentUser = username;
            sessionStorage.setItem('ruankao_user', currentUser);
            document.getElementById('loginModal').classList.add('hidden');
            loadData();
        }

        // 如果已有用户名，直接隐藏登录弹窗并加载数据
        if (currentUser) {
            document.getElementById('loginModal').classList.add('hidden');
        }

        // 加载统计数据
        async function loadStats() {
            try {
                const response = await fetch(`/api/stats?user=${currentUser}`);
                statsData = await response.json();
            } catch (e) {
                console.log('统计数据加载失败');
                statsData = { overall: {}, questions: {} };
            }
        }

        // 保存答题记录
        async function saveQuestionRecord(qId, isCorrect) {
            try {
                const existing = statsData.questions?.[qId] || { attempts: 0, correctCount: 0, wrongCount: 0 };
                const record = {
                    attempts: existing.attempts + 1,
                    correctCount: existing.correctCount + (isCorrect ? 1 : 0),
                    wrongCount: existing.wrongCount + (isCorrect ? 0 : 1)
                };

                const response = await fetch(`/api/stats/question/${qId}?user=${currentUser}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(record)
                });
                const result = await response.json();
                if (result.success) {
                    statsData = result.stats;
                }
            } catch (e) {
                console.error('保存答题记录失败:', e);
            }
        }

        // 格式化解析内容
        function formatAnalysis(text) {
            if (!text) return '';
            let paragraphs = text.split(/[。！？]/);
            let html = '';
            let count = 0;
            for (let s of paragraphs) {
                if (s.trim()) {
                    s = s.replace(/([A-D][选项]?选择|第一空|第二空|第三空|综上|因此|所以|答案)/g, '<span class="highlight">$1</span>');
                    html += `<p>${s}。</p>`;
                    count++;
                    if (count >= 3) {
                        count = 0;
                        html += '<br>';
                    }
                }
            }
            return html;
        }

        // 格式化案例分析题内容
        function formatCaseContent(text) {
            if (!text) return '';
            const matches = text.match(/【问题(\d+)[】\)](?:\s*[（(]\s*(\d+)\s*分\s*[）)]\s*)?\s*([^【]*)/g);
            const introMatch = text.match(/^(.+?)(?=【问题\d+[】\)])/);
            let html = '';

            if (introMatch) {
                html += `<div class="case-intro"><h4>案例背景</h4><p>${introMatch[1].trim()}</p></div>`;
            }

            if (matches) {
                for (let m of matches) {
                    const parts = m.match(/【问题(\d+)[】\)](?:\s*[（(]\s*(\d+)\s*分\s*[）)]\s*)?\s*(.*)/);
                    if (parts) {
                        html += `<div class="case-question-block">
                            <div class="case-question-header">
                                <span class="case-question-num">问题${parts[1]}</span>
                                ${parts[2] ? `<span class="case-question-points">(${parts[2]}分)</span>` : ''}
                            </div>
                            <div class="case-question-content">${parts[3].trim()}</div>
                        </div>`;
                    }
                }
            }
            return html;
        }

        // 格式化案例分析题答案
        function formatCaseAnswer(text) {
            if (!text) return '';
            const matches = text.match(/【问题(\d+)[】\)]\s*([^【]*)/g);
            if (!matches) return `<div class="answer-item"><p>${text}</p></div>`;

            let html = '';
            for (let m of matches) {
                const parts = m.match(/【问题(\d+)[】\)]\s*(.*)/);
                if (parts) {
                    html += `<div class="answer-item">
                        <div class="answer-item-header">问题${parts[1]}答案</div>
                        <div class="answer-item-content">${parts[2].trim()}</div>
                    </div>`;
                }
            }
            return html;
        }

        // 格式化范文
        function formatEssaySample(text) {
            if (!text) return '';
            const parts = text.split(/\n\n/);
            let html = '';
            for (let part of parts) {
                if (!part.trim()) continue;
                const firstLine = part.split('\n')[0].trim();
                if (/^[一二三四五六七八九十]+[、．.]/.test(firstLine)) {
                    html += `<h4 class="essay-section-title">${firstLine}</h4>`;
                    const rest = part.split('\n').slice(1).join('<br>');
                    if (rest) html += `<p class="essay-paragraph">${rest}</p>`;
                } else {
                    html += `<p class="essay-paragraph">${part.replace(/\n/g, '<br>')}</p>`;
                }
            }
            return html;
        }

        // 加载数据
        async function loadData() {
            await loadStats();
            try {
                const res = await fetch('questions_data.json');
                data = await res.json();
                renderSidebar();
                showHome();
            } catch(e) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="welcome-card">
                        <p style="color: #f44336;">加载失败，请刷新重试</p>
                    </div>
                `;
            }
        }

        // 渲染侧边栏（章节排序）
        function renderSidebar() {
            const content = document.getElementById('sidebarContent');
            let html = `<div class="menu-section">
                <div class="menu-title">章节练习 <span class="menu-count">${Object.keys(data.chapter_practice).length}</span></div>`;

            // 章节排序
            const chapters = Object.keys(data.chapter_practice);
            chapters.sort((a, b) => {
                const numA = parseInt(a.match(/第(\d+)章/)?.[1] || 0);
                const numB = parseInt(b.match(/第(\d+)章/)?.[1] || 0);
                return numA - numB;
            });

            for (const chapter of chapters) {
                const count = data.chapter_practice[chapter].length;
                html += `<div class="menu-item" onclick="startChapter('${chapter}')">
                    <span>${chapter}</span>
                    <span class="count">${count}题</span>

            }
            html += '</div>';

            // 模拟题
            for (const examType of Object.keys(data.mock_exams)) {
                html += `<div class="menu-section">
                    <div class="menu-title">${examType} <span class="menu-count">${Object.keys(data.mock_exams[examType]).length}套</span></div>`;
                for (const examName of Object.keys(data.mock_exams[examType])) {

                    const shortName = examName.replace('2025年上半年系统架构设计师考试模拟试卷（', '').replace('）', '');

            if (data.essay_samples) {

                html += `<div class="menu-section">
                    <div class="menu-title">论文范本 <span class="menu-count">${totalEssays}篇</span></div>`;

        // 显示错题列表
        function showWrongQuestions() {
            closeSidebar();
            if (!statsData || !statsData.questions) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="question-card">
                        <div class="welcome-title">错题本</div>
                        <p style="color: var(--text-light); text-align: center;">暂无答题记录，开始刷题后会记录错题。</p>
                    </div>
                `;
                document.getElementById('bottomNav').style.display = 'none';
                return;
            }

            // 收集所有错题ID
            const wrongQuestionIds = [];
            for (const [qId, record] of Object.entries(statsData.questions)) {
                if (record.wrongCount > 0) {
                    wrongQuestionIds.push({
                        id: qId,
                        wrongCount: record.wrongCount,
                        correctCount: record.correctCount || 0
                    });
                }
            }

            if (wrongQuestionIds.length === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="question-card">
                        <div class="welcome-title">错题本</div>
                        <p style="color: var(--text-light); text-align: center;">恭喜！目前没有错题记录。</p>
                    </div>
                `;
                document.getElementById('bottomNav').style.display = 'none';
                return;
            }

            // 查找错题详情
            const wrongQuestions = [];
            for (const item of wrongQuestionIds) {
                // 在章节练习中查找
                for (const [chapter, questions] of Object.entries(data.chapter_practice)) {
                    const q = questions.find(q => q.id === item.id);
                    if (q) {
                        wrongQuestions.push({ ...q, chapter, ...item });
                        break;
                    }
                }
                // 在模拟题中查找
                if (!wrongQuestions.find(wq => wq.id === item.id)) {
                    for (const [examType, exams] of Object.entries(data.mock_exams)) {
                        for (const [examName, questions] of Object.entries(exams)) {
                            const q = questions.find(q => q.id === item.id);
                            if (q) {
                                wrongQuestions.push({ ...q, examType, examName, ...item });
                                break;
                            }
                        }
                    }
                }
            }

            // 显示错题列表
            let html = `
                <div class="question-card" style="padding-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="welcome-title">错题本 (${wrongQuestions.length}题)</div>
                    </div>
                    <p style="color: var(--text-light); margin-bottom: 15px;">点击题目查看详情并重做：</p>
            `;

            for (let i = 0; i < wrongQuestions.length; i++) {
                const q = wrongQuestions[i];
                const source = q.chapter ? `章节：${q.chapter.substring(0, 15)}...` : `模拟：${q.examType}`;
                const typeLabel = q.type === 'choice' ? '单选' : q.type === 'multi_choice' ? '多选' : q.type;
                html += `
                    <div class="question-card" style="margin: 0 0 10px 0; padding: 12px; border-left: 4px solid #f44336;" onclick="startWrongQuestionPractice(${i})">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="flex: 1;">
                                <div style="color: #f44336; font-size: 12px; margin-bottom: 5px;">${source} | ${typeLabel}</div>
                                <div style="color: var(--text); line-height: 1.5; font-size: 14px;">${q.content.substring(0, 50)}${q.content.length > 50 ? '...' : ''}</div>
                            </div>
                            <div style="text-align: right; margin-left: 10px;">
                                <div style="color: #f44336; font-size: 13px;">错${q.wrongCount}</div>
                                <div style="color: #4caf50; font-size: 11px;">对${q.correctCount}</div>
                            </div>
                        </div>
                    </div>
                `;
            }

            html += '</div>';
            document.getElementById('mainContent').innerHTML = html;
            document.getElementById('bottomNav').style.display = 'none';

            // 保存错题列表供后续使用
            window.wrongQuestionsList = wrongQuestions;
        }

        // 从错题开始练习（使用错题列表作为题目来源）
        function startWrongQuestionPractice(index) {
            if (!window.wrongQuestionsList || window.wrongQuestionsList.length === 0) return;
            currentQuestions = window.wrongQuestionsList;
            currentIndex = index;
            userAnswers = {};
            submittedAnswers = {};
            correctCount = 0;
            wrongCount = 0;
            renderQuestion();
        }

        // 从错题开始练习（旧方法，按题目ID查找）
        function startWrongQuestion(questionId) {
            // 查找题目所在位置
            for (const [chapter, questions] of Object.entries(data.chapter_practice)) {
                const index = questions.findIndex(q => q.id === questionId);
                if (index !== -1) {
                    currentQuestions = questions;
                    currentIndex = index;
                    userAnswers = {};
                    submittedAnswers = {};
                    correctCount = 0;
                    wrongCount = 0;
                    renderQuestion();
                    return;
                }
            }
            for (const [examType, exams] of Object.entries(data.mock_exams)) {
                for (const [examName, questions] of Object.entries(exams)) {
                    const index = questions.findIndex(q => q.id === questionId);
                    if (index !== -1) {
                        currentQuestions = questions;
                        currentIndex = index;
                        userAnswers = {};
                        submittedAnswers = {};
                        correctCount = 0;
                        wrongCount = 0;
                        renderQuestion();
                        return;
                    }
                }
            }
        }

        // 开始章节练习
        function startChapter(chapter) {
            closeSidebar();
            currentQuestions = data.chapter_practice[chapter];
            currentIndex = 0;
            userAnswers = {};
            submittedAnswers = {};
            correctCount = 0;
            wrongCount = 0;
            renderQuestion();
        }

        // 开始模拟题
        function startExam(examType, examName) {
            closeSidebar();
            currentQuestions = data.mock_exams[examType][examName];
            currentIndex = 0;
            userAnswers = {};
            submittedAnswers = {};
            correctCount = 0;
            wrongCount = 0;
            renderQuestion();
        }

        // 渲染题目
        function renderQuestion() {
            document.getElementById('bottomNav').style.display = 'flex';
            if (currentQuestions.length === 0) {
                document.getElementById('mainContent').innerHTML = '<div class="welcome-card"><p>暂无题目</p></div>';
                return;
            }

            const q = currentQuestions[currentIndex];
            currentQId = q.id;
            const isSubmitted = submittedAnswers[q.id];

            let html = `
                <div class="progress-bar">
                    <span class="progress-text">${currentIndex + 1}/${currentQuestions.length}</span>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: ${(currentIndex + 1) / currentQuestions.length * 100}%"></div>
                    </div>
                    <span class="progress-text">✓${correctCount} ✗${wrongCount}</span>
                </div>
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-num">第${q.number}题 [${q.id}]</span>
                        ${q.knowledge_point ? `<span class="tag knowledge">${q.knowledge_point.split('>')[0]}</span>` : ''}
                        ${q.pass_rate ? `<span class="tag">通过率${q.pass_rate}</span>` : ''}
                    </div>
            `;

            // 根据题型渲染
            if (q.type === 'choice' || q.type === 'multi_choice') {
                html += renderChoiceQuestion(q, isSubmitted);
            } else if (q.type === 'case_analysis') {
                html += renderCaseAnalysisQuestion(q);
            } else if (q.type === 'essay') {
                html += renderEssayQuestion(q);
            }

            html += '</div>';
            document.getElementById('mainContent').innerHTML = html;
            document.querySelector('.nav-btn.prev').disabled = currentIndex === 0;
            document.querySelector('.nav-btn.next').disabled = currentIndex === currentQuestions.length - 1;
        }

        // 渲染选择题
        function renderChoiceQuestion(q, isSubmitted) {
            const isMulti = q.type === 'multi_choice' && q.options.length > 1;
            const userAns = userAnswers[q.id] || [];
            const correctAns = q.answer.split(' ');
            let html = '';

            // 图片
            if (q.image) {
                html += `<div class="question-image"><img src="${q.image}" alt="题目图片"></div>`;
            }

            html += `<div class="question-content">${q.content}</div>`;

            // 讲义提示
            if (q.lecture_hint) {
                html += `<div style="margin: 12px 0; padding: 12px; background: #e3f2fd; border-radius: 8px; border-left: 3px solid #1976d2;">
                    <div style="color: #1976d2; font-weight: 600; margin-bottom: 6px; font-size: 13px;">📚 讲义提示</div>
                    <div style="color: #333; line-height: 1.5; font-size: 14px;">${q.lecture_hint}</div>
                </div>`;
            }

            for (let i = 0; i < q.options.length; i++) {
                if (isMulti) html += `<div class="options-label">第${i + 1}空</div>`;
                html += '<div class="options-group">';
                for (const opt of q.options[i]) {
                    const selected = userAns[i] === opt.letter;
                    const isCorrect = correctAns[i] === opt.letter;
                    let cls = 'option-item';
                    if (isSubmitted) {
                        if (isCorrect) cls += ' correct';
                        if (selected && !isCorrect) cls += ' wrong';
                    } else if (selected) {
                        cls += ' selected';
                    }
                    const dataAttrs = isSubmitted ? '' : `data-group="${i}" data-letter="${opt.letter}"`;
                    html += `<div class="${cls}" ${dataAttrs}>
                        <span class="option-letter">${opt.letter}</span>
                        <span class="option-text">${opt.text}</span>
                    </div>`;
                }
                html += '</div>';
            }

            // 提交按钮
            html += `<div style="text-align: center; margin-top: 15px;">`;
            if (!isSubmitted) {
                html += `<button class="submit-btn" data-submit>提交答案</button>`;
            }
            html += `</div>`;

            // 答案区域
            html += `<div class="answer-box ${isSubmitted ? '' : 'hidden'}">
                <div class="answer-title">正确答案: ${q.answer}</div>
                ${q.analysis ? `<div class="analysis-title">试题解析</div><div class="analysis-content">${formatAnalysis(q.analysis)}</div>` : ''}
                ${q.lecture_hint ? `<div class="analysis-title" style="color: #1976d2;">讲义提示</div><div class="analysis-content" style="background: #e3f2fd; border-left-color: #1976d2;">${q.lecture_hint}</div>` : ''}
            </div>`;

            return html;
        }

        // 渲染案例分析题
        function renderCaseAnalysisQuestion(q) {
            let html = `<div class="question-content">${formatCaseContent(q.content)}</div>`;

            // 图片
            if (q.images && q.images.length > 0) {
                html += `<div class="question-image">${q.images.map(img => `<img src="${img}" alt="题目图片">`).join('')}</div>`;
            }

            html += `<div style="text-align: center; margin-top: 15px;">
                <button class="submit-btn" onclick="document.getElementById('answerBox').classList.remove('hidden')">查看答案</button>
            </div>`;

            html += `<div class="answer-box hidden" id="answerBox">
                <div class="answer-title">参考答案</div>
                <div class="answer-content">${formatCaseAnswer(q.answer)}</div>
                ${q.answer_images && q.answer_images.length > 0 ?
                    `<div class="question-image">${q.answer_images.map(img => `<img src="${img}" alt="答案图片">`).join('')}</div>` : ''}
                ${q.analysis ? `<div class="analysis-title">试题分析</div><div class="analysis-content">${formatAnalysis(q.analysis)}</div>` : ''}
                ${q.lecture_hint ? `<div class="analysis-title" style="color: #1976d2;">讲义提示</div><div class="analysis-content" style="background: #e3f2fd; border-left-color: #1976d2;">${q.lecture_hint}</div>` : ''}
            </div>`;
            return html;
        }

        // 渲染论文题
        function renderEssayQuestion(q) {
            const essaySample = q.essay_sample || '暂无范文';
            let html = `<div class="question-content">${q.content}</div>`;

            html += `<div style="text-align: center; margin-top: 15px;">
                <button class="submit-btn" onclick="document.getElementById('answerBox').classList.remove('hidden')">查看范文</button>
            </div>`;

            html += `<div class="answer-box hidden" id="answerBox">
                <div class="answer-title">范文</div>
                <div class="analysis-content">${formatEssaySample(essaySample)}</div>
                ${q.images && q.images.length > 0 ?
                    `<div class="question-image">${q.images.map(img => `<img src="${img}" alt="范文图片">`).join('')}</div>` : ''}
            </div>`;
            return html;
        }

        // 选择选项（事件委托）
        document.getElementById('mainContent').addEventListener('click', function(e) {
            const opt = e.target.closest('.option-item[data-letter]');
            if (opt) {
                const group = parseInt(opt.getAttribute('data-group'));
                const letter = opt.getAttribute('data-letter');
                if (!userAnswers[currentQId]) userAnswers[currentQId] = [];
                userAnswers[currentQId][group] = letter;
                renderQuestion();
            }

            const submitBtn = e.target.closest('[data-submit]');
            if (submitBtn) {
                submitAnswer();
            }
        });

        // 提交答案
        function submitAnswer() {
            const q = currentQuestions[currentIndex];
            const userAns = userAnswers[q.id] || [];
            if (!userAns.some(a => a)) {
                alert('请先选择答案');
                return;
            }

            const correctAns = q.answer.split(' ');
            let allCorrect = true;
            for (let i = 0; i < correctAns.length; i++) {
                if (userAns[i] !== correctAns[i]) {
                    allCorrect = false;
                    break;
                }
            }

            if (allCorrect) correctCount++;
            else wrongCount++;

            submittedAnswers[q.id] = true;

            // 保存答题记录
            saveQuestionRecord(q.id, allCorrect);

            renderQuestion();

            if (currentIndex === currentQuestions.length - 1) {
                const total = correctCount + wrongCount;
                const score = Math.round(correctCount / total * 100);
                document.getElementById('resultScore').textContent = score + '%';
                document.getElementById('resultDetail').textContent = `正确 ${correctCount} / 错误 ${wrongCount}`;
                document.getElementById('resultModal').classList.add('show');
            }
        }

        // 导航
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        // 侧边栏
        function toggleSidebar() {
            document.getElementById('sidebarOverlay').classList.add('show');
            document.getElementById('sidebar').classList.add('show');
        }

        function closeSidebar() {
            document.getElementById('sidebarOverlay').classList.remove('show');
            document.getElementById('sidebar').classList.remove('show');
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
        }

        function showStats() {
            const overall = statsData.overall || {};
            const totalAttempts = overall.totalAttempts || 0;
            const accuracy = overall.accuracy || 0;
            const totalCorrect = overall.totalCorrect || 0;
            const totalWrong = overall.totalWrong || 0;

            document.getElementById('mainContent').innerHTML = `
                <div class="page-title">学习统计</div>
                <div class="home-stats" style="margin: 16px;">
                    <div class="stats-grid">
                        <div class="stat-card" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                            <div class="stat-value" style="color: white;">${totalAttempts}</div>
                            <div class="stat-label" style="color: white;">总答题次数</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);">
                            <div class="stat-value" style="color: white;">${accuracy}%</div>
                            <div class="stat-label" style="color: white;">总正确率</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #4caf50 0%, #81c784 100%);">
                            <div class="stat-value" style="color: white;">${totalCorrect}</div>
                            <div class="stat-label" style="color: white;">总正确数</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f44336 0%, #e57373 100%); cursor: pointer;" onclick="showWrongQuestions()">
                            <div class="stat-value" style="color: white;">${totalWrong}</div>
                            <div class="stat-label" style="color: white;">总错误数</div>
                        </div>
                    </div>
                </div>
                <div class="welcome-card">
                    <div class="welcome-title">当前进度</div>
                    <p style="color: var(--text-light);">本次答题：正确 ${correctCount} / 错误 ${wrongCount}</p>
                    <p style="color: var(--text-light); margin-top: 8px;">正确率：${correctCount + wrongCount > 0 ? Math.round(correctCount / (correctCount + wrongCount) * 100) : 0}%</p>
                </div>
                <div style="text-align: center; margin: 20px;">
                    <button class="submit-btn" onclick="showHome()">返回首页</button>
                </div>
            `;
        }

        // 初始化
        // 如果已有用户名，直接加载；否则等待登录弹窗确认
        if (currentUser) {
            loadData();
        }
    </script>
</body>
</html>
