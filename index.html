<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统架构设计师考试刷题系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            color: white;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        header .nav-links {
            margin-top: 15px;
        }

        header .nav-link {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border-radius: 20px;
            text-decoration: none;
            margin: 0 10px;
            transition: all 0.3s;
        }

        header .nav-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .main-content {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .sidebar {
            border-right: 1px solid #eee;
            padding-right: 20px;
        }

        .sidebar h2 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .category-list {
            list-style: none;
        }

        .category-item {
            padding: 12px 15px;
            margin-bottom: 5px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .category-item:hover {
            background: #f0f0f0;
        }

        .category-item.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .category-item .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8em;
            margin-left: 8px;
        }

        .category-item.active .badge {
            background: white;
            color: #667eea;
        }

        .sub-list {
            list-style: none;
            padding-left: 15px;
            margin-top: 8px;
        }

        .sub-item {
            padding: 8px 12px;
            margin-bottom: 3px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            color: #666;
        }

        .sub-item:hover {
            background: #f5f5f5;
        }

        .sub-item.active {
            background: #e8e8e8;
            color: #667eea;
            font-weight: 500;
        }

        .question-area {
            padding: 20px;
        }

        .progress-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .progress-info {
            flex: 1;
        }

        .progress-info span {
            font-size: 0.9em;
            color: #666;
        }

        .progress-track {
            flex: 2;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }

        .question-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 1.1em;
            color: #667eea;
            font-weight: 600;
        }

        .question-meta {
            display: flex;
            gap: 10px;
        }

        .meta-tag {
            padding: 4px 12px;
            background: #f0f0f0;
            border-radius: 15px;
            font-size: 0.85em;
            color: #666;
        }

        .meta-tag.knowledge {
            background: #e3f2fd;
            color: #1976d2;
        }

        .meta-tag.rate {
            background: #fff3e0;
            color: #f57c00;
        }

        .question-content {
            font-size: 1.1em;
            line-height: 1.8;
            margin-bottom: 25px;
            color: #333;
        }

        .options-container {
            margin-bottom: 20px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-group-label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 10px;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 15px;
            margin-bottom: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option-item.selected {
            border-color: #667eea;
            background: #e8f4ff;
        }

        .option-item.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }

        .option-item.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        .option-letter {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: #f0f0f0;
            border-radius: 50%;
            font-weight: 600;
            margin-right: 15px;
            color: #333;
        }

        .option-item.selected .option-letter {
            background: #667eea;
            color: white;
        }

        .option-item.correct .option-letter {
            background: #4caf50;
            color: white;
        }

        .option-item.wrong .option-letter {
            background: #f44336;
            color: white;
        }

        .option-text {
            flex: 1;
            line-height: 1.6;
        }

        .answer-section {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .answer-section.hidden {
            display: none;
        }

        .answer-title {
            font-size: 1em;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .answer-content {
            font-size: 1em;
            color: #333;
            padding: 10px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .analysis-title {
            font-size: 1em;
            color: #1976d2;
            margin-top: 15px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .analysis-content {
            font-size: 0.95em;
            color: #555;
            line-height: 1.8;
            padding: 15px;
            background: white;
            border-radius: 8px;
        }

        .analysis-content p {

            text-indent: 2em;
        }

        .analysis-content p:last-child {
            margin-bottom: 0;
        }

        .analysis-content .highlight {

            font-weight: 500;
        }

        /* 案例分析题样式 */

            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .case-intro h4 {

            margin-bottom: 10px;

        }

        .case-intro p {
            line-height: 1.8;
            color: #333;
        }

        .case-question-block {

            border: 1px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .case-question-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .case-question-num {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 0.9em;
        }

        .case-question-points {
            color: #f57c00;
            font-size: 0.85em;
            margin-left: 10px;
        }

        .case-question-content {
            line-height: 1.8;
            color: #333;
        }

        .answer-item {
            background: #fff;
            border-left: 3px solid #667eea;
            padding: 10px 15px;
            margin-bottom: 15px;
        }

        .answer-item-header {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .answer-item-content {
            line-height: 1.6;
            color: #333;
        }

        /* 论文范文样式 */
        .essay-content {
            padding: 15px;
            background: #fff;
        }

        .essay-section-title {
            color: #667eea;
            font-size: 1.1em;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 2px solid #667eea;
        }

        .essay-section-content {
            line-height: 1.8;
            color: #333;
            padding: 10px 0;
        }

        .essay-paragraph {
            margin-bottom: 12px;
            line-height: 1.8;
            color: #333;
            text-indent: 0;
        }

        .essay-images {
            margin-top: 15px;

        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
            justify-content: center;

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;

        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #4caf50;
            color: white;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .nav-btn {
            padding: 10px 25px;
            background: #f8f9fa;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: #e8e8e8;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 案例分析题样式 */
        .case-question {
            padding: 20px;
            margin-bottom: 15px;
            background: #fafafa;
            border-radius: 10px;
        }

        .case-question-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .case-question-content {
            color: #555;
            line-height: 1.8;
        }

        /* 统计面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 600;
            color: #333;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 300px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                padding-right: 0;
                border-bottom: 1px solid #eee;
                padding-bottom: 20px;
            }

            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 模式切换 */
        .mode-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: white;
            font-size: 0.9em;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* 搜索框 */
        .search-box {
            margin-bottom: 20px;
        }

        .search-input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95em;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* 论文范本样式 */
        .essay-card {
            border: 2px solid #e8e8e8;
            margin-bottom: 30px;
        }

        .essay-header {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 12px 12px 0 0;
            flex-wrap: wrap;
        }

        .essay-number {
            background: white;
            color: #667eea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .essay-title {
            font-size: 1.1em;
            font-weight: bold;
        }

        .essay-id {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .essay-section {
            padding: 20px;
            border-bottom: 1px solid #eee;
        }

        .essay-section:last-child {
            border-bottom: none;
        }

        .essay-section h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1em;
            display: inline-block;
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 5px;

        .essay-question {
            background: #fff3e0;
            padding: 15px 20px;
            border-radius: 8px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;

        .essay-abstract {
            background: #e3f2fd;

            border-radius: 8px;

        }

        .essay-content {

        /* 登录弹窗 */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            display: flex;
            align-items: center;

        .login-content {

<body>
    <!-- 用户登录弹窗 -->
    <div class="login-modal" id="loginModal">
        <div class="login-content">
            <div class="login-title">刷题系统登录</div>
            <div class="login-input-group">
                <label>请输入用户名：</label>
                <input type="text" id="usernameInput" placeholder="输入用户名" value="bandly">
            </div>
            <button class="login-btn" onclick="confirmUsername()">开始刷题</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h1>系统架构设计师考试刷题系统</h1>
            <p>2025年上半年 | 希塞题库</p>
            <div class="nav-links">
                <a href="index.html" class="nav-link">刷题练习</a>
                <a href="essay.html" class="nav-link">论文评审</a>
            </div>
        </header>

        <div class="main-content">
            <div class="sidebar">
                <h2>题库目录</h2>

                <div class="search-box">
                    <input type="text" class="search-input" placeholder="搜索题目..." id="searchInput">
                </div>

                <ul class="category-list" id="categoryList">
                    <!-- 动态生成 -->
                </ul>
            </div>

            <div class="question-area" id="questionArea">
                <div class="loading">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 全局数据
        let questionsData = null;
        let statsData = null;
        let currentCategory = null;
        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = {};
        let submittedAnswers = {};  // 记录已提交的题目
        let correctCount = 0;
        let wrongCount = 0;
        let answeredCount = 0;

        // 用户名（登录后设置）
        let currentUser = sessionStorage.getItem('ruankao_user') || '';

        // 确认用户名
        function confirmUsername() {
            const input = document.getElementById('usernameInput');
            const username = input.value.trim();
            if (!username) {
                alert('请输入用户名');
                return;
            }
            currentUser = username;
            sessionStorage.setItem('ruankao_user', currentUser);
            document.getElementById('loginModal').classList.add('hidden');
            loadQuestions();
        }

        // 如果已有用户名，直接隐藏登录弹窗并加载数据
        if (currentUser) {
            document.getElementById('loginModal').classList.add('hidden');
        }

        // 格式化解析内容，使其分段显示
        function formatAnalysis(text) {
            if (!text) return '';

            // 按关键句分段
            let paragraphs = [];

            // 匹配模式：选项说明、空说明、总结句等
            const patterns = [
                /[一二三四五六七八九十]+[、\.]?\s*[选项空题]/g,  // 第一空、第二空等
                /[A-D][选项]/g,  // A选项、B选项等
                /综上[，,。]/g,  // 综上，
                /因此[，,。]/g,  // 因此，
                /所以[，,。]/g,  // 所以，
                /答案[是为]/g,   // 答案是、答案为
            ];

            // 找到所有分段点
            let breaks = [];
            for (const pattern of patterns) {
                let match;
                while ((match = pattern.exec(text)) !== null) {
                    if (match.index > 0) {
                        breaks.push(match.index);
                    }
                }
            }

            // 排序分段点
            breaks.sort((a, b) => a - b);

            // 如果没有分段点，尝试按句号分段（每2-3个句号一段）
            if (breaks.length === 0) {
                let sentences = text.split(/[。！？]/);
                let currentPara = '';
                let sentenceCount = 0;
                for (let s of sentences) {
                    if (s.trim()) {
                        currentPara += s + '。';
                        sentenceCount++;
                        // 每2-3个句子一段，或者遇到明显的关键词
                        if (sentenceCount >= 2 ||
                            /[综上因此所以答案选择]/.test(s)) {
                            paragraphs.push(currentPara.trim());
                            currentPara = '';
                            sentenceCount = 0;
                        }
                    }
                }
                if (currentPara.trim()) {
                    paragraphs.push(currentPara.trim());
                }
            } else {
                // 按分段点切分
                breaks.unshift(0);
                breaks.push(text.length);
                for (let i = 0; i < breaks.length - 1; i++) {
                    let para = text.substring(breaks[i], breaks[i + 1]).trim();
                    if (para) {
                        paragraphs.push(para);
                    }
                }
            }

            // 转换为HTML
            if (paragraphs.length === 0) {
                return `<p>${text}</p>`;
            }

            return paragraphs.map(p => {
                // 高亮关键词
                p = p.replace(/([A-D][选项]?选择|第一空|第二空|第三空|综上|因此|所以|答案)/g, '<span class="highlight">$1</span>');
                return `<p>${p}</p>`;
            }).join('');
        }

        // 格式化案例分析题内容（按【问题】分段）
        function formatCaseContent(text) {
            if (!text) return '';

            // 按【问题】分割
            const parts = text.split(/【问题\d+[】\)]/);
            const matches = text.match(/【问题\d+[】\)]([^【]*)/g);

            if (!matches || matches.length === 0) {
                return `<div class="case-section"><p>${text}</p></div>`;
            }

            // 提取背景描述（第一个【问题】之前的内容）
            const introMatch = text.match(/^(.+?)(?=【问题\d+[】\)])/);
            let html = '';

            if (introMatch) {
                html += `<div class="case-intro"><h4>案例背景</h4><p>${introMatch[1].trim()}</p></div>`;
            }

            // 处理每个问题
            for (let i = 0; i < matches.length; i++) {
                const questionText = matches[i];
                const questionMatch = questionText.match(/【问题(\d+)[】\)](?:\s*[（(]\s*(\d+)\s*分\s*[）)]\s*)?\s*(.*)/);

                if (questionMatch) {
                    const qNum = questionMatch[1];
                    const points = questionMatch[2] || '';
                    const content = questionMatch[3].trim();

                    html += `<div class="case-question-block">
                        <div class="case-question-header">
                            <span class="case-question-num">问题${qNum}</span>
                            ${points ? `<span class="case-question-points">(${points}分)</span>` : ''}
                        </div>
                        <div class="case-question-content">${content}</div>
                    </div>`;
                }
            }

            return html;
        }

        // 格式化案例分析题答案（按【问题】分段）
        function formatCaseAnswer(text) {
            if (!text) return '';

            // 按【问题】分割
            const matches = text.match(/【问题(\d+)[】\)]([^【]*)/g);

            if (!matches || matches.length === 0) {
                return `<div class="answer-item"><p>${text}</p></div>`;
            }

            let html = '';
            for (let i = 0; i < matches.length; i++) {
                const answerText = matches[i];
                const answerMatch = answerText.match(/【问题(\d+)[】\)]\s*(.*)/);

                if (answerMatch) {
                    const qNum = answerMatch[1];
                    const content = answerMatch[2].trim();

                    html += `<div class="answer-item">
                        <div class="answer-item-header">问题${qNum}答案</div>
                        <div class="answer-item-content">${content}</div>
                    </div>`;
                }
            }

            return html;
        }

        // 格式化范文内容（按章节标题分段）
        function formatEssaySample(text) {
            if (!text) return '';

            // 按章节标题分段（如：一、二、三、或 1. 2. 3.）
            const parts = text.split(/\n\n/);
            let html = '';

            for (const part of parts) {
                if (!part.trim()) continue;

                // 检查是否是标题行（以一、二、三、或数字开头）
                const lines = part.split('\n');
                const firstLine = lines[0].trim();

                if (/^[一二三四五六七八九十]+[、．.]/.test(firstLine)) {
                    // 大章节标题
                    html += `<h4 class="essay-section-title">${firstLine}</h4>`;
                    if (lines.length > 1) {
                        html += `<div class="essay-section-content">${lines.slice(1).join('<br>').replace(/(\d+\.|（\d+）)/g, '<br><strong>$1</strong>')}</div>`;
                    }
                } else if (/^\d+[、．.]/.test(firstLine) || /^（\d+）/.test(firstLine)) {
                    // 小节标题
                    html += `<p class="essay-paragraph"><strong>${firstLine}</strong><br>${lines.slice(1).join('<br>')}</p>`;
                } else {
                    // 普通段落
                    html += `<p class="essay-paragraph">${part.replace(/\n/g, '<br>')}</p>`;
                }
            }

            return html;
        }

        // 保存答题记录
        async function saveQuestionRecord(qId, isCorrect) {
            try {
                const existing = statsData.questions?.[qId] || { attempts: 0, correctCount: 0, wrongCount: 0 };
                const record = {
                    attempts: existing.attempts + 1,
                    correctCount: existing.correctCount + (isCorrect ? 1 : 0),
                    wrongCount: existing.wrongCount + (isCorrect ? 0 : 1)
                };

                const response = await fetch(`/api/stats/question/${qId}?user=${currentUser}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(record)
                });
                const result = await response.json();
                if (result.success) {
                    statsData = result.stats;
                }
            } catch (error) {
                console.error('保存答题记录失败:', error);
            }
        }

            if (!statsData || !statsData.questions) {

                `;
                return;
            }

            // 收集所有错题ID
            const wrongQuestionIds = [];
            for (const [qId, record] of Object.entries(statsData.questions)) {
                if (record.wrongCount > 0) {
                    wrongQuestionIds.push({
                        id: qId,
                        wrongCount: record.wrongCount,
                        correctCount: record.correctCount || 0
                    });
                }
            }

            if (wrongQuestionIds.length === 0) {
                document.getElementById('questionArea').innerHTML = `
                    <div class="question-card">
                        <h2 style="color: #667eea;">错题本</h2>
                        <p style="color: #666;">恭喜！目前没有错题记录。</p>
                    </div>
                `;
                return;
            }

            // 查找错题详情
            const wrongQuestions = [];
            for (const item of wrongQuestionIds) {
                // 在章节练习中查找
                for (const [chapter, questions] of Object.entries(questionsData.chapter_practice)) {
                    const q = questions.find(q => q.id === item.id);
                    if (q) {
                        wrongQuestions.push({ ...q, chapter, ...item });
                        break;
                    }
                }
                // 在模拟题中查找
                if (!wrongQuestions.find(wq => wq.id === item.id)) {
                    for (const [examType, exams] of Object.entries(questionsData.mock_exams)) {
                        for (const [examName, questions] of Object.entries(exams)) {
                            const q = questions.find(q => q.id === item.id);
                            if (q) {
                                wrongQuestions.push({ ...q, examType, examName, ...item });
                                break;
                            }
                        }
                    }
                }

                const q = wrongQuestions[i];
                const source = q.chapter ? `章节：${q.chapter}` : `模拟：${q.examType}/${q.examName}`;

                            </div>

                    </div>
                    <div class="question-content">${q.content}</div>
                    ${q.image ? `<div class="question-image"><img src="${q.image}" alt="题目图片" style="max-width: 100%; margin-top: 15px;"></div>` : ''}
                    <div class="options-container">
            `;

            // 渲染选项组
            for (let i = 0; i < q.options.length; i++) {
                if (isMulti && q.options.length > 1) {
                    html += `<div class="option-group"><div class="option-group-label">第 ${i + 1} 空:</div>`;
                }

                for (const opt of q.options[i]) {
                    const isSelected = userAnswer[i] === opt.letter;
                    const isCorrect = q.answer.split(' ')[i] === opt.letter;

                    let optClass = 'option-item';
                    if (isSelected) optClass += ' selected';
                    // 只有提交后才显示正确/错误样式
                    if (isSubmitted) {
                        if (isCorrect) optClass += ' correct';
                        if (isSelected && !isCorrect) optClass += ' wrong';
                    }

                    // 使用 data 属性存储点击信息
                    const dataAttrs = isSubmitted ? "" : `data-qid="${q.id}" data-group="${i}" data-letter="${opt.letter}"`;

                    html += `
                        <div class="${optClass}" ${dataAttrs}>
                            <span class="option-letter">${opt.letter}</span>
                            <span class="option-text">${opt.text}</span>
                        </div>
                    `;
                }

                if (isMulti && q.options.length > 1) {
                    html += '</div>';
                }
            }

            html += '</div>';

            // 查看答案按钮
            const hasAnswer = isSubmitted;
            html += `
                <div class="btn-group">
                    ${isSubmitted ? '' : `<button class="btn btn-primary" data-submit="${q.id}">提交答案</button>`}
                </div>
            `;

            // 答案和解析（只有提交后显示）
            html += `
                <div class="answer-section ${hasAnswer ? '' : 'hidden'}" id="answer-${q.id}">
                    <div class="answer-title">正确答案</div>
                    <div class="answer-content">${q.answer}</div>
                    ${q.analysis ? `
                        <div class="analysis-title">试题解析</div>
                        <div class="analysis-content">${formatAnalysis(q.analysis)}</div>
                    ` : ''}
                    ${q.lecture_hint ? `
                        <div class="analysis-title" style="color: #1976d2;">讲义提示</div>
                        <div class="analysis-content" style="background: #e3f2fd; border-left-color: #1976d2;">${q.lecture_hint}</div>
                    ` : ''}
                </div>
            `;

            html += '</div>';
            return html;
        }

        // 渲染案例分析题
        function renderCaseAnalysisQuestion(q) {
            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">试题 ${q.number} [${q.id}] - 案例分析</span>
                    </div>
                    <div class="question-content">${formatCaseContent(q.content)}</div>
                    ${q.images && q.images.length > 0 ? `
                        <div class="case-images">
                            ${q.images.map(img => `<img src="${img}" alt="题目图片" style="max-width: 100%; margin: 15px 0;">`).join('')}
                        </div>
                    ` : ''}
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="showCaseAnswer('${q.id}')">查看答案</button>
                    </div>
                    <div class="answer-section hidden" id="answer-${q.id}">
                        <div class="answer-title">参考答案</div>
                        <div class="answer-content">${formatCaseAnswer(q.answer)}</div>
                        ${q.answer_images && q.answer_images.length > 0 ? `
                            <div class="case-images">
                                ${q.answer_images.map(img => `<img src="${img}" alt="答案图片" style="max-width: 100%; margin: 15px 0;">`).join('')}
                            </div>
                        ` : ''}
                        ${q.analysis ? `
                            <div class="analysis-title">试题分析</div>
                            <div class="analysis-content">${formatAnalysis(q.analysis)}</div>
                        ` : ''}
                        ${q.lecture_hint ? `
                            <div class="analysis-title" style="color: #1976d2;">讲义提示</div>
                            <div class="analysis-content" style="background: #e3f2fd; border-left-color: #1976d2;">${q.lecture_hint}</div>
                        ` : ''}
                    </div>
                </div>
            `;
            return html;
        }

        // 渲染论文题
        function renderEssayQuestion(q) {
            const essaySample = q.essay_sample || '暂无范文';
            const images = q.images || [];
            let html = `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">试题 ${q.number} [${q.id}] - 论文写作</span>
                    </div>
                    <div class="question-content">${q.content}</div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="showEssayAnswer('${q.id}')">查看范文</button>
                    </div>
                    <div class="answer-section hidden" id="answer-${q.id}">
                        <div class="answer-title">范文</div>
                        <div class="essay-content">${formatEssaySample(essaySample)}</div>
                        ${images.length > 0 ? `
                            <div class="essay-images">
                                ${images.map(img => `<img src="${img}" alt="范文图片" style="max-width: 100%; margin: 15px 0;">`).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
            return html;
        }

        // 选择选项
        function selectOption(qId, groupIndex, letter) {
            if (!userAnswers[qId]) {
                userAnswers[qId] = [];
            }
            userAnswers[qId][groupIndex] = letter;
            renderQuestion();
        }

        // 提交答案
        async function submitAnswer(qId) {
            const q = currentQuestions[currentIndex];
            const userAnswer = userAnswers[qId] || [];
            const correctAnswer = q.answer.split(' ');

            if (userAnswer.length === 0) {
                alert('请先选择答案！');
                return;
            }

            // 检查答案
            let allCorrect = true;
            for (let i = 0; i < correctAnswer.length; i++) {
                if (userAnswer[i] !== correctAnswer[i]) {
                    allCorrect = false;
                    break;
                }
            }

            if (allCorrect) {
                correctCount++;
            } else {
                wrongCount++;
            }
            answeredCount++;

            // 标记已提交
            submittedAnswers[qId] = true;

            // 保存到服务器
            await saveQuestionRecord(qId, allCorrect);

            // 显示答案和解析
            document.getElementById(`answer-${qId}`).classList.remove('hidden');
            renderQuestion();
        }

        // 显示答案
        function showAnswer(qId) {
            document.getElementById(`answer-${qId}`).classList.remove('hidden');
        }

        // 显示案例分析答案
        function showCaseAnswer(qId) {
            document.getElementById(`answer-${qId}`).classList.remove('hidden');
        }

        // 显示论文范文
        function showEssayAnswer(qId) {
            document.getElementById(`answer-${qId}`).classList.remove('hidden');
        }

        // 上一题
        function prevQuestion() {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (currentIndex < currentQuestions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        }

        // 搜索题目
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            if (keyword.length < 2) return;

            // 搜索所有题目
            const results = [];
            for (const chapter of Object.keys(questionsData.chapter_practice)) {
                for (const q of questionsData.chapter_practice[chapter]) {
                    if (q.content.toLowerCase().includes(keyword) ||
                        q.knowledge_point.toLowerCase().includes(keyword)) {
                        results.push({ ...q, source: chapter });
                    }
                }
            }
            for (const examType of Object.keys(questionsData.mock_exams)) {
                for (const examName of Object.keys(questionsData.mock_exams[examType])) {
                    for (const q of questionsData.mock_exams[examType][examName]) {
                        if (q.content.toLowerCase().includes(keyword)) {
                            results.push({ ...q, source: `${examType} - ${examName}` });
                        }
                    }
                }
            }

            // 显示搜索结果
            if (results.length > 0) {
                currentCategory = { type: 'search', keyword: keyword };
                currentQuestions = results;
                currentIndex = 0;
                userAnswers = {};
                submittedAnswers = {};
                renderQuestion();
            } else {
                document.getElementById('questionArea').innerHTML = `
                    <div class="question-card">
                        <p>未找到包含 "${keyword}" 的题目。</p>
                    </div>
                `;
            }
        });

        // 初始化
        // 如果已有用户名，直接加载；否则等待登录弹窗确认
        if (currentUser) {
            loadQuestions();
        }

        // 事件委托 - 处理选项点击和提交按钮点击
        document.getElementById('questionArea').addEventListener('click', function(e) {
            const target = e.target.closest('.option-item');
            if (target && target.hasAttribute('data-qid')) {
                const qId = target.getAttribute('data-qid');
                const group = parseInt(target.getAttribute('data-group'));
                const letter = target.getAttribute('data-letter');
                selectOption(qId, group, letter);
            }

            const submitBtn = e.target.closest('button[data-submit]');
            if (submitBtn) {
                const qId = submitBtn.getAttribute('data-submit');
                submitAnswer(qId);
            }
        });
    </script>
</body>
</html>
